<!DOCTYPE html>
<html>
<head>
<title>🎬 Movie Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: radial-gradient(circle at top left, #0f0c29, #302b63, #24243e);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}

/* Animated film reel and filmstrip background */
body::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url('https://cdn.pixabay.com/photo/2017/01/31/13/14/film-2028552_1280.png') no-repeat left center,
                url('https://cdn.pixabay.com/photo/2016/03/31/19/56/filmstrip-1294496_1280.png') no-repeat right center;
    background-size: 300px, 400px;
    opacity: 0.3;
    animation: glow 6s infinite alternate;
}

@keyframes glow {
    from { filter: drop-shadow(0 0 10px #ff00ff); }
    to { filter: drop-shadow(0 0 25px #00f0ff); }
}

/* Login card */
.card {
    background: rgba(0,0,0,0.6);
    border: 2px solid #00f0ff;
    border-radius: 20px;
    padding: 30px;
    width: 320px;
    box-shadow: 0 0 25px #00f0ff, 0 0 50px #ff00ff;
    text-align: center;
    color: #fff;
    position: relative;
    z-index: 2;
}

.card h3 {
    color: #ffd700;
    font-weight: bold;
    margin-bottom: 20px;
    text-shadow: 0 0 10px #ff00ff;
}

.form-control {
    background: rgba(255,255,255,0.1);
    border: 1px solid #00f0ff;
    border-radius: 25px;
    color: #fff;
    margin-bottom: 15px;
}

.form-control::placeholder {
    color: #ccc;
}

.btn {
    border-radius: 25px;
    font-weight: bold;
    background: linear-gradient(90deg, #ff00ff, #00f0ff);
    border: none;
    color: white;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #00f0ff, 0 0 40px #ff00ff;
}

a {
    color: #00f0ff;
    text-decoration: none;
    margin-top: 10px;
    display: block;
}
a:hover {
    color: #ff00ff;
    text-shadow: 0 0 10px #ff00ff;
}
</style>
</head>

<body>
<div class="card">
    <h3>🎬 Movie Login</h3>
    <form method="post">
        <input class="form-control" name="username" placeholder="Username">
        <input class="form-control" name="password" type="password" placeholder="Password">
        <button class="btn w-100">Login</button>
    </form>
    <a href="/register">✨ New User? Register</a>
</div>
</body>
</html>
