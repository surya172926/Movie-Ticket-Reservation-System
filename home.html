 <!DOCTYPE html>
<html>
<head>
    <title>🎬 MovieZone Booking</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top left, #0f0c29, #302b63, #24243e);
            color: white;
        }

        .navbar {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px #00f0ff;
        }

        .navbar-brand {
            font-weight: 600;
            color: #ffd700 !important;
        }

        .hero {
            text-align: center;
            padding: 50px 0;
        }

        .hero h1 {
            font-weight: 600;
            font-size: 42px;
            color: #ffd700;
            text-shadow: 0 0 15px #ff00ff;
        }

        .hero p {
            color: #ccc;
        }

        .card {
            border-radius: 20px;
            overflow: hidden;
            transition: 0.3s;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: none;
            box-shadow: 0 0 25px #00f0ff, 0 0 40px #ff00ff;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.03);
        }

        .card img {
            height: 300px;
            width: 100%;
            object-fit: cover;
        }

        .movie-title {
            background: rgba(0,0,0,0.8);
            color: #ffd700;
            padding: 10px;
            border-radius: 12px;
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .btn-book {
            background: linear-gradient(90deg, #ff00ff, #00f0ff);
            border: none;
            border-radius: 30px;
            padding: 10px 25px;
            color: white;
            font-weight: bold;
        }

        .btn-book:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #00f0ff, 0 0 40px #ff00ff;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-4">
    <span class="navbar-brand">🎬 MovieZone</span>
    <a href="/logout" class="btn btn-danger">Logout</a>
</nav>

<!-- HERO -->
<div class="hero">
    <h1>Book Your Favorite Movie 🍿</h1>
    <p>Enjoy the best cinema experience</p>
</div>

<!-- MOVIES -->
<div class="container">
    <div class="row">

        {% for movie in movies %}
        <div class="col-md-3 mb-4">
            <div class="card text-center text-white">

                <!-- POSTERS -->
                {% if movie == "RRR" %}
                    <img src="{{ url_for('static', filename='images/RRR.jpg') }}">

                {% elif movie == "Pushpa" %}
                    <img src="{{ url_for('static', filename='images/puspha.jpg') }}">

                {% elif movie == "KGF" %}
                    <img src="{{ url_for('static', filename='images/kgf.png') }}">

                {% elif movie == "Salaar" %}
                    <img src="{{ url_for('static', filename='images/salar.jpg') }}">

                {% endif %}

                <div class="p-3">

                    <!-- MOVIE NAME -->
                    <h5 class="movie-title">{{ movie }}</h5>

                    <!-- BUTTON -->
                    <a href="/book/{{ movie }}" class="btn btn-book mt-2">Book Now</a>

                </div>

            </div>
        </div>
        {% endfor %}

    </div>
</div>

</body>
</html>
